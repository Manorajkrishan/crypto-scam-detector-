services:
  - type: web
    name: crypto-scam-detector-api
    runtime: node
    plan: free
    rootDir: crypto-scam-detector/backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://frontend-phi-three-83.vercel.app
      - key: ETHERSCAN_API_KEY
        sync: false
      - key: CHAINABUSE_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: PYTHON_PATH
        value: python3
